version: 2

exposures:
  - name: museum_daily_operations_dashboard
    type: dashboard
    maturity: high
    description: >
      Power BI dashboard showing daily revenue, visitors, ticket AOV, retail performance,
      and gate traffic. Used by executive team for morning briefing.
    depends_on:
      - ref('rpt_daily_operations')
      - ref('rpt_visitor_traffic')
      - ref('rpt_retail_performance')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [power_bi, operations, executive]
    meta:
      power_bi_workspace: Museum Analytics
      power_bi_dataset: Museum Daily Operations
      refresh_schedule: "Daily 6:30 AM ET"

  - name: membership_donor_dashboard
    type: dashboard
    maturity: high
    description: >
      Power BI dashboard for membership team showing customer LTV, donor retention,
      membership status distribution, and engagement segments.
    depends_on:
      - ref('rpt_member_360')
      - ref('rpt_customer_ltv')
      - ref('dim_customer')
      - ref('fct_donor_retention')
      - ref('fct_donor_cohort_survival')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [power_bi, membership, development]
    meta:
      power_bi_workspace: Museum Analytics
      power_bi_dataset: Membership & Donors
      refresh_schedule: "Daily 7:00 AM ET"

  - name: retail_performance_dashboard
    type: dashboard
    maturity: high
    description: >
      Power BI dashboard for gift shop performance: product sales, category trends,
      AOV, discount penetration, and customer attach rate.
    depends_on:
      - ref('rpt_retail_performance')
      - ref('fct_retail_line_items')
      - ref('dim_product')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [power_bi, retail]
    meta:
      power_bi_workspace: Museum Analytics
      power_bi_dataset: Retail Performance
      refresh_schedule: "Daily 6:30 AM ET"

  - name: capacity_planning_dashboard
    type: dashboard
    maturity: medium
    description: >
      Power BI dashboard for ticket capacity management: availability by date/window,
      demand benchmarks, sold-out detection, and utilization trends.
    depends_on:
      - ref('fct_ticket_availability')
      - ref('fct_ticket_demand_benchmarks')
      - ref('dim_ticket_type')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [power_bi, capacity, operations]
    meta:
      power_bi_workspace: Museum Analytics
      power_bi_dataset: Capacity Planning
      refresh_schedule: "Every 30 minutes"

  - name: campaign_analytics_dashboard
    type: dashboard
    maturity: medium
    description: >
      Power BI dashboard for email marketing: campaign open/click/bounce rates,
      performance by type, audience tier analysis.
    depends_on:
      - ref('rpt_campaign_performance')
      - ref('dim_campaign')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [power_bi, marketing]
    meta:
      power_bi_workspace: Museum Analytics
      power_bi_dataset: Campaign Analytics
      refresh_schedule: "Daily 7:00 AM ET"

  - name: cortex_agent_museum_operations
    type: application
    maturity: high
    description: >
      Cortex Agent providing natural language analytics over museum operations.
      Connects to SV_MUSEUM_OPERATIONS and SV_DONOR_RETENTION semantic views.
      Full observability enabled for question pattern tracking.
    depends_on:
      - ref('fct_ticket_sales')
      - ref('fct_retail_line_items')
      - ref('fct_daily_operations')
      - ref('fct_visitor_traffic')
      - ref('fct_campaign_performance')
      - ref('rpt_customer_ltv')
      - ref('dim_customer')
      - ref('dim_gate')
      - ref('dim_campaign')
      - ref('dim_ticket_type')
      - ref('dim_product')
      - ref('dim_payment_method')
      - ref('dim_date')
      - ref('fct_donor_retention')
      - ref('fct_donor_cohort_survival')
      - ref('fct_ticket_availability')
      - ref('fct_ticket_demand_benchmarks')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [cortex_agent, ai, semantic_view]
    meta:
      agent_fqn: MUSEUM_DW_PROD.GOLD.MUSEUM_OPERATIONS_AGENT
      semantic_views:
        - MUSEUM_DW_PROD.GOLD.SV_MUSEUM_OPERATIONS
        - MUSEUM_DW_PROD.GOLD.SV_DONOR_RETENTION
      observability: enabled

  - name: power_bi_semantic_views_connector
    type: application
    maturity: high
    description: >
      Power BI Semantic Views connector consuming SV_MUSEUM_OPERATIONS for
      DirectQuery access with pre-defined metrics and relationships.
    depends_on:
      - ref('fct_ticket_sales')
      - ref('fct_retail_line_items')
      - ref('fct_daily_operations')
      - ref('fct_visitor_traffic')
      - ref('rpt_customer_ltv')
      - ref('dim_customer')
      - ref('dim_date')
      - ref('dim_gate')
      - ref('dim_ticket_type')
      - ref('dim_product')
      - ref('dim_payment_method')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [power_bi, semantic_view, connector]
    meta:
      connection_string: "om01578.east-us.azure.snowflakecomputing.com"
      warehouse: DBT_PROD_WH
      role: POWERBI_ROLE

  - name: ml_visitor_forecasting
    type: ml
    maturity: medium
    description: >
      Snowflake ML FORECAST model predicting daily visitor counts by ticket type
      and entry window. Trained on fct_ticket_demand_benchmarks.
    depends_on:
      - ref('ml_daily_visitor_features')
      - ref('ml_ticket_demand_features')
      - ref('fct_ticket_demand_benchmarks')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [ml, forecasting]
    meta:
      model_type: FORECAST
      forecast_horizon: 90 days

  - name: ml_donor_churn_model
    type: ml
    maturity: low
    description: >
      Donor churn prediction model using member engagement, visit recency,
      and donation velocity features.
    depends_on:
      - ref('ml_donor_churn_features')
      - ref('ml_member_churn_features')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [ml, churn, membership]
    meta:
      model_type: CLASSIFICATION
      target_column: is_churned

  - name: ml_ticket_no_show_model
    type: ml
    maturity: medium
    description: >
      Predicts which purchased tickets will not be scanned (no-shows).
      Enables overbooking strategy for high no-show probability slots.
    depends_on:
      - ref('ml_ticket_no_show_features')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [ml, tickets, revenue_optimization]
    meta:
      model_type: CLASSIFICATION
      target_column: is_no_show

  - name: ml_dynamic_pricing_model
    type: ml
    maturity: medium
    description: >
      Demand-based pricing model suggesting price multipliers for ticket
      slots based on utilization benchmarks and demand patterns.
    depends_on:
      - ref('ml_dynamic_pricing_features')
      - ref('fct_ticket_availability')
      - ref('fct_ticket_demand_benchmarks')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [ml, pricing, revenue_optimization]
    meta:
      model_type: REGRESSION
      target_column: suggested_price_multiplier

  - name: ml_email_send_time_model
    type: ml
    maturity: medium
    description: >
      Per-subscriber optimal send time prediction. Maximizes open rate
      by learning individual engagement patterns.
    depends_on:
      - ref('ml_email_send_time_features')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [ml, email, marketing]
    meta:
      model_type: CLASSIFICATION
      target_column: was_opened

  - name: ml_donor_upgrade_model
    type: ml
    maturity: medium
    description: >
      Identifies members most likely to upgrade to the next LTV tier.
      Combines spending velocity, engagement signals, and tenure.
    depends_on:
      - ref('ml_donor_upgrade_propensity_features')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [ml, membership, stewardship]
    meta:
      model_type: CLASSIFICATION
      target_column: is_upgrade_candidate

  - name: ml_campaign_response_model
    type: ml
    maturity: low
    description: >
      Campaign response scoring model identifying high-propensity
      subscribers for targeted fundraising and event promotion.
    depends_on:
      - ref('ml_campaign_response_features')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [ml, marketing, targeting]
    meta:
      model_type: CLASSIFICATION
      target_column: is_high_responder

  - name: ml_retail_cross_sell_model
    type: ml
    maturity: low
    description: >
      Product co-occurrence recommender for gift shop cross-sell.
      Identifies frequently co-purchased items for bundling and POS suggestions.
    depends_on:
      - ref('ml_retail_cross_sell_features')
    owner:
      name: Jeremy Myers
      email: jmyers@911memorial.org
    tags: [ml, retail, merchandising]
    meta:
      model_type: COLLABORATIVE_FILTERING
      target_column: co_purchase_count
