name: dbt CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'models/**'
      - 'macros/**'
      - 'tests/**'
      - 'snapshots/**'
      - 'analyses/**'
      - 'seeds/**'
      - 'dbt_project.yml'
      - 'packages.yml'
  push:
    branches: [main]

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

jobs:
  dbt-ci:
    name: Build & Test Modified Models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout main branch (for slim CI state comparison)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-snowflake~=1.9.0

      - name: Write CI profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          museum_dbt:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "$SNOWFLAKE_ACCOUNT"
                user: "$SNOWFLAKE_USER"
                password: "$SNOWFLAKE_PASSWORD"
                role: "$SNOWFLAKE_ROLE"
                database: MUSEUM_DW_DEV
                warehouse: "$SNOWFLAKE_WAREHOUSE"
                schema: SILVER
                threads: 4
          EOF

      - name: Generate main branch manifest (slim CI baseline)
        run: |
          cd main-branch
          dbt deps --target ci
          dbt compile --target ci
          mkdir -p ../target-main
          cp target/manifest.json ../target-main/

      - name: Install dependencies
        run: dbt deps

      - name: Compile all models
        run: dbt compile --target ci

      - name: Build modified + downstream (slim CI)
        if: github.event_name == 'pull_request'
        run: |
          dbt build \
            --select state:modified+ \
            --defer \
            --state target-main/ \
            --target ci \
            --fail-fast

      - name: Pre-deploy validation (dev vs prod comparison)
        if: github.event_name == 'pull_request'
        run: dbt run-operation validate_before_deploy --target ci
        continue-on-error: true

      - name: Post results summary
        if: always()
        run: |
          echo "## dbt CI Results" >> $GITHUB_STEP_SUMMARY
          echo "- Compile: passed" >> $GITHUB_STEP_SUMMARY
          echo "- Slim CI: built modified models + downstream" >> $GITHUB_STEP_SUMMARY
          echo "- Pre-deploy validation: see logs for PASS/WARN/FAIL" >> $GITHUB_STEP_SUMMARY

  docs-generate:
    name: Generate & Deploy Docs
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: dbt-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install dbt-snowflake~=1.9.0

      - name: Write CI profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          museum_dbt:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: "$SNOWFLAKE_ACCOUNT"
                user: "$SNOWFLAKE_USER"
                password: "$SNOWFLAKE_PASSWORD"
                role: "$SNOWFLAKE_ROLE"
                database: MUSEUM_DW_PROD
                warehouse: "$SNOWFLAKE_WAREHOUSE"
                schema: SILVER
                threads: 4
          EOF

      - run: dbt deps
      - run: dbt docs generate --target ci

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: target/
          retention-days: 30
