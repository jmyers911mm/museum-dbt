verified_queries:
  - name: availability_next_week
    description: >
      Ticket availability for the next 7 days by date and type.
      Used by box office for real-time capacity management.
    file: availability_next_week.sql
    semantic_view: NS11MM_DW_PROD.GOLD.SV_DONOR_RETENTION
    question: "What is ticket availability for the next week?"
    stakeholder_owner: Jeremy Myers
    adm_reference: ADR-008-CP-001
    approved_by: jeremy_myers
    approved_date: "2026-05-21"
    tags: [capacity, availability, operations, certified]
    power_bi_datasets:
      - Capacity Planning

  - name: sold_out_slots
    description: >
      Time slots at Very High or Sold Out demand levels for upcoming dates.
      Triggers overflow pricing or capacity expansion decisions.
    file: sold_out_slots.sql
    semantic_view: NS11MM_DW_PROD.GOLD.SV_DONOR_RETENTION
    question: "Which time slots are sold out or near capacity?"
    stakeholder_owner: Jeremy Myers
    adm_reference: ADR-008-CP-002
    approved_by: jeremy_myers
    approved_date: "2026-05-21"
    tags: [capacity, demand, action_required, certified]
    power_bi_datasets:
      - Capacity Planning

  - name: peak_demand_benchmarks
    description: >
      Historical demand patterns (avg, P90) by ticket type, day, and window.
