version: 2

seeds:
  - name: ref_customer_segments
    description: Reference data for customer identity resolution segments
    config:
      schema: GOLD
    columns:
      - name: customer_segment
        tests:
          - unique
          - not_null

  - name: ref_payment_methods
    description: Reference data for payment method dimension
    config:
      schema: GOLD
    columns:
      - name: payment_method_id
        tests:
          - unique
          - not_null

  - name: ref_ticket_types
    description: Reference data for ticket type dimension with pricing
    config:
      schema: GOLD
    columns:
      - name: ticket_type_id
        tests:
          - unique
          - not_null

  - name: ref_ltv_tiers
    description: Reference data for customer LTV tier boundaries
    config:
      schema: GOLD
    columns:
      - name: ltv_tier
        tests:
          - unique
          - not_null

  - name: raw_google_analytics
    description: Seed data for Google Analytics sessions (simulates bronze.raw_google_analytics)
    config:
      schema: BRONZE
    columns:
      - name: session_id
        tests:
          - unique
          - not_null

  - name: raw_google_ads
    description: Seed data for Google Ads daily performance (simulates bronze.raw_google_ads)
    config:
      schema: BRONZE
    columns:
      - name: ad_id
        tests:
          - not_null

  - name: raw_meta_ads
    description: Seed data for Meta Ads daily performance (simulates bronze.raw_meta_ads)
    config:
      schema: BRONZE
    columns:
      - name: ad_id
        tests:
          - not_null

  - name: ref_marketing_channels
    description: Reference data for marketing channel dimension
    config:
      schema: GOLD
    columns:
      - name: channel_id
        tests:
          - unique
          - not_null
      - name: channel_name
        tests:
          - unique
          - not_null
