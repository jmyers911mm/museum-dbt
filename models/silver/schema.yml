version: 2

models:
  - name: silver_pos_tickets
    description: Cleaned POS ticket transactions with derived visitor categories and discount flags
    tests:
      - hashdiff_integrity:
          hashdiff_column: hashdiff
          unique_key: transaction_id
      - late_arriving_data:
          timestamp_column: transaction_timestamp
          max_lag_hours: 72
          config:
            severity: warn
      - daily_volume_bounds:
          date_column: transaction_date
          min_rows_per_day: 10
          max_rows_per_day: 500
      - cardinality_change:
          column_name: ticket_type
          min_expected: 5
          max_expected: 15
    columns:
      - name: transaction_id
        description: Unique identifier for the ticket transaction
        tests:
          - unique
          - not_null
      - name: transaction_timestamp
        description: Timestamp of the transaction
        tests:
          - not_null
      - name: transaction_date
        description: Date portion of the transaction timestamp
        tests:
          - not_null
      - name: ticket_type
        description: Type of ticket sold
        tests:
          - not_null
      - name: visitor_category
        description: Derived visitor category based on ticket type
        tests:
          - not_null
          - accepted_values:
              values: ['Adult', 'Child', 'Senior', 'Member', 'School Group', 'Family', 'Other']
      - name: quantity
        description: Number of tickets in the transaction
        tests:
          - not_null
          - value_between:
              min_value: 1
              max_value: 50
      - name: unit_price
        description: Price per ticket
        tests:
          - not_null
          - value_between:
              min_value: 0
              max_value: 100
      - name: total_amount
        description: Total amount for the transaction
        tests:
          - not_null
          - z_score_outlier:
              max_zscore: 3
              config:
                severity: warn
              config:
                severity: warn
          - positive_value
      - name: discount_amount
        description: Discount applied to transaction
        tests:
          - positive_value
      - name: customer_email
        description: Customer email if provided
        tests:
          - null_rate_threshold:
              max_null_pct: 80
      - name: payment_method
        description: Payment method used
        tests:
          - accepted_values:
              values: ['Credit Card', 'Debit Card', 'Cash', 'Mobile Pay']

  - name: silver_pos_retail
    description: Cleaned POS retail/gift shop transactions with discount calculations
    tests:
      - hashdiff_integrity:
          hashdiff_column: hashdiff
          unique_key: transaction_id
          config:
            severity: warn
      - late_arriving_data:
          timestamp_column: transaction_timestamp
          max_lag_hours: 72
          config:
            severity: warn
      - daily_volume_bounds:
          date_column: transaction_date
          min_rows_per_day: 5
          max_rows_per_day: 500
      - cardinality_change:
          column_name: item_category
          min_expected: 4
          max_expected: 20
    columns:
      - name: transaction_id
        description: Unique identifier for the retail transaction
        tests:
          - unique
          - not_null
      - name: transaction_date
        description: Date of the retail transaction
        tests:
          - not_null
      - name: item_sku
        description: Product stock keeping unit
        tests:
          - not_null
      - name: item_name
        description: Product name
        tests:
          - not_null
      - name: item_category
        description: Product category
        tests:
          - not_null
      - name: quantity
        description: Number of items purchased
        tests:
          - not_null
      - name: unit_price
        description: Price per item
        tests:
          - not_null
      - name: total_amount
        description: Total transaction amount
        tests:
          - not_null
          - z_score_outlier:
              max_zscore: 3
              config:
                severity: warn
          - positive_value
      - name: discount_pct
        description: Calculated discount percentage
        tests:
          - value_between:
              min_value: 0
              max_value: 1

  - name: silver_ticket_scans
    description: Cleaned ticket scanning events with validity flags and time bucketing
    tests:
      - hashdiff_integrity:
          hashdiff_column: hashdiff
          unique_key: scan_id
      - late_arriving_data:
          timestamp_column: scan_timestamp
          max_lag_hours: 72
          config:
            severity: warn
      - daily_volume_bounds:
          date_column: scan_date
          min_rows_per_day: 20
          max_rows_per_day: 1000
      - cardinality_change:
          column_name: gate_id
          min_expected: 2
          max_expected: 10
      - distribution_shift:
          column_name: scan_result
          value: VALID
          min_pct: 70
          max_pct: 99
    columns:
      - name: scan_id
        description: Unique identifier for the scan event
        tests:
          - unique
          - not_null
      - name: scan_timestamp
        description: Timestamp of the scan
        tests:
          - not_null
      - name: scan_date
        description: Date portion of the scan timestamp
        tests:
          - not_null
      - name: scan_hour
        description: Hour of the scan (9-17)
        tests:
          - not_null
          - value_between:
              min_value: 0
              max_value: 23
      - name: gate_id
        description: Gate where the scan occurred
        tests:
          - not_null
      - name: scan_result
        description: Outcome of the scan
        tests:
          - not_null
          - accepted_values:
              values: ['VALID', 'EXPIRED', 'ALREADY_USED', 'INVALID']
      - name: is_valid_scan
        description: Boolean flag indicating a valid scan
        tests:
          - not_null
      - name: visitor_count
        description: Number of visitors entering on this scan
        tests:
          - not_null
          - value_between:
              min_value: 1
              max_value: 50

  - name: silver_sf_crm
    description: Cleaned CRM contacts with computed membership status, donor tiers, and engagement metrics
    tests:
      - hashdiff_integrity:
          hashdiff_column: hashdiff
          unique_key: contact_id
    meta:
      owner: Membership & Development Team
      contains_pii: true
      data_classification: confidential
    columns:
      - name: contact_id
        description: Salesforce 18-character contact ID
        tests:
          - unique
          - not_null
      - name: email
        description: Contact email address (lowercased, trimmed)
        meta:
          pii: true
          pii_type: email
        tests:
          - not_null
          - unique
      - name: full_name
        description: Concatenated first and last name
        meta:
          pii: true
          pii_type: name
        tests:
          - not_null
      - name: membership_type
        description: Type of museum membership
        tests:
          - not_null
          - accepted_values:
              values: ['Individual', 'Family', 'Student', 'Senior', 'Patron', 'Benefactor']
      - name: computed_membership_status
        description: Membership status computed from dates and source status
        tests:
          - not_null
          - accepted_values:
              values: ['Active', 'Grace Period', 'Expired', 'Lapsed', 'Unknown']
      - name: donor_tier
        description: Donor classification based on YTD donation amount
        tests:
          - not_null
          - accepted_values:
              values: ['Major Donor', 'Mid-Level Donor', 'Donor', 'Small Donor', 'Non-Donor']
      - name: days_since_last_visit
        description: Number of days since the member last visited the museum
        tests:
          - not_null
          - value_between:
              min_value: 0
              max_value: 3650
      - name: donation_total_ytd
        description: Year-to-date donation total
        tests:
          - positive_value
          - z_score_outlier:
              max_zscore: 3
              config:
                severity: warn
      - name: membership_duration_days
        description: Duration of membership in days
        tests:
          - positive_value

  - name: silver_sf_marketing_cloud
    description: Cleaned Marketing Cloud email events with derived flags
    meta:
      owner: Marketing Team
      contains_pii: true
      data_classification: internal
    tests:
      - hashdiff_integrity:
          hashdiff_column: hashdiff
          unique_key: event_id
          config:
            severity: warn
      - late_arriving_data:
          timestamp_column: event_timestamp
          max_lag_hours: 72
          config:
            severity: warn
      - cardinality_change:
          column_name: campaign_id
          min_expected: 1
          max_expected: 50
      - distribution_shift:
          column_name: event_type
          value: Sent
          min_pct: 20
          max_pct: 70
    columns:
      - name: event_id
        description: Unique identifier for the email event
        tests:
          - unique
          - not_null
      - name: event_timestamp
        description: Timestamp of the email event
        tests:
          - not_null
      - name: event_date
        description: Date of the email event
        tests:
          - not_null
      - name: subscriber_key
        description: Subscriber identifier
        tests:
          - not_null
      - name: email_address
        description: Recipient email address
        meta:
          pii: true
          pii_type: email
        tests:
          - not_null
      - name: event_type
        description: Type of email event
        tests:
          - not_null
          - accepted_values:
              values: ['Sent', 'Open', 'Click', 'Bounce', 'Unsubscribe']
      - name: campaign_id
        description: Campaign that generated the event
        tests:
          - not_null
      - name: campaign_name
        description: Name of the email campaign
        tests:
          - not_null
      - name: is_bounced
        description: Whether this event was a bounce
        tests:
          - not_null
      - name: is_unsubscribed
        description: Whether this event was an unsubscribe
        tests:
          - not_null

  - name: silver_google_analytics
    description: Cleaned Google Analytics session data with channel groupings and page categorization
    meta:
      owner: Marketing Team
    tests:
      - hashdiff_integrity:
          hashdiff_column: hashdiff
          unique_key: session_id
    columns:
      - name: session_id
        description: Unique session identifier
        tests:
          - unique
          - not_null
      - name: session_date
        description: Date of the session
        tests:
          - not_null
      - name: user_pseudo_id
        description: Anonymous user identifier
        tests:
          - not_null
      - name: source
        description: Traffic source
        tests:
          - not_null
      - name: medium
        description: Traffic medium
        tests:
          - not_null
      - name: channel_grouping
        description: Derived marketing channel grouping
        tests:
          - not_null
          - accepted_values:
              values: ['Paid Search', 'Paid Social', 'Organic Search', 'Email', 'Direct', 'Other']
      - name: page_category
        description: Derived page category based on URL path
        tests:
          - not_null
          - accepted_values:
              values: ['Tickets', 'Membership', 'Retail', 'Exhibitions', 'Donations', 'General']
      - name: event_name
        description: Primary session event
        tests:
          - not_null
      - name: is_conversion
        description: Whether the session resulted in a purchase
        tests:
          - not_null
      - name: session_duration_seconds
        description: Duration of the session in seconds
        tests:
          - not_null

  - name: silver_google_ads
    description: Cleaned Google Ads performance data with derived ROAS and campaign categorization
    meta:
      owner: Marketing Team
    tests:
      - hashdiff_integrity:
          hashdiff_column: hashdiff
          unique_key: ad_id
          config:
            severity: warn
    columns:
      - name: ad_id
        description: Ad identifier
        tests:
          - not_null
      - name: campaign_id
        description: Google Ads campaign identifier
        tests:
          - not_null
      - name: campaign_name
        description: Campaign name
        tests:
          - not_null
      - name: ad_date
        description: Date of the ad performance record
        tests:
          - not_null
      - name: impressions
        description: Number of impressions
        tests:
          - not_null
      - name: clicks
        description: Number of clicks
        tests:
          - not_null
      - name: cost
        description: Cost in dollars (converted from micros)
        tests:
          - not_null
      - name: conversions
        description: Number of conversions
        tests:
          - not_null
      - name: network
        description: Ad network (SEARCH or DISPLAY)
        tests:
          - not_null
          - accepted_values:
              values: ['SEARCH', 'DISPLAY']
      - name: campaign_category
        description: Derived campaign category
        tests:
          - not_null
          - accepted_values:
              values: ['Tickets', 'Membership', 'Retail', 'General']

  - name: silver_meta_ads
    description: Cleaned Meta Ads performance data with ROAS and cost metrics
    meta:
      owner: Marketing Team
    tests:
      - hashdiff_integrity:
          hashdiff_column: hashdiff
          unique_key: ad_id
          config:
            severity: warn
    columns:
      - name: ad_id
        description: Ad identifier
        tests:
          - not_null
      - name: campaign_id
        description: Meta campaign identifier
        tests:
          - not_null
      - name: campaign_name
        description: Campaign name
        tests:
          - not_null
      - name: ad_date
        description: Date of the ad performance record
        tests:
          - not_null
      - name: platform
        description: Meta platform (facebook or instagram)
        tests:
          - not_null
          - accepted_values:
              values: ['facebook', 'instagram']
      - name: impressions
        description: Number of impressions
        tests:
          - not_null
      - name: clicks
        description: Number of clicks
        tests:
          - not_null
      - name: spend
        description: Amount spent in dollars
        tests:
          - not_null
      - name: objective
        description: Campaign objective
        tests:
          - not_null
          - accepted_values:
              values: ['CONVERSIONS', 'AWARENESS', 'TRAFFIC']
      - name: campaign_category
        description: Derived campaign category
        tests:
          - not_null
          - accepted_values:
              values: ['Membership', 'Promotions', 'Awareness', 'General']
