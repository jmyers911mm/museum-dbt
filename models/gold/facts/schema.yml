version: 2

models:
  - name: fct_ticket_sales
    description: Ticket-level sales fact with scan outcomes, identity-resolved customers, and all dimension FKs
    meta:
      owner: Data Engineering
      grain: one row per ticket barcode
    columns:
      - name: ticket_number
        description: Unique ticket barcode - primary key
        tests:
          - unique
          - not_null
      - name: transaction_id
        description: Transaction ID (may have multiple tickets)
        tests:
          - not_null
      - name: transaction_date
        tests:
          - not_null
      - name: ticket_type
        tests:
          - not_null
          - relationships:
              to: ref('dim_ticket_type')
              field: ticket_type_id
      - name: payment_method_id
        tests:
          - relationships:
              to: ref('dim_payment_method')
              field: payment_method_id
              severity: warn
      - name: customer_id
        description: Identity-resolved customer ID (NULL for anonymous)
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id
              severity: warn
      - name: entry_gate
        tests:
          - relationships:
              to: ref('dim_gate')
              field: gate_id
              severity: warn
      - name: utilization_status
        tests:
          - accepted_values:
              values: ['Used', 'Unused', 'Rejected']
      - name: total_amount
        tests:
          - not_null

  - name: fct_retail_line_items
    description: Line-item retail fact with identity-resolved customers and product/payment FKs
    meta:
      owner: Data Engineering
      grain: one row per retail line item
    columns:
      - name: transaction_id
        description: Retail transaction ID
        tests:
          - not_null
      - name: transaction_date
        tests:
          - not_null
      - name: product_id
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: payment_method_id
        tests:
          - relationships:
              to: ref('dim_payment_method')
              field: payment_method_id
              severity: warn
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id
              severity: warn
      - name: quantity
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null

  - name: fct_ticket_utilization
    description: "DEPRECATED: Superseded by fct_ticket_sales (ticket-level grain with customer_id, payment_method_id)"
    config:
      deprecation_date: "2026-07-01"
    meta:
      deprecation_date: "2026-07-01"
      superseded_by: fct_ticket_sales

  - name: fct_retail_performance
    description: "DEPRECATED: Superseded by fct_retail_line_items (line-item grain with customer, product, payment FKs)"
    config:
      deprecation_date: "2026-07-01"
    meta:
      deprecation_date: "2026-07-01"
      superseded_by: fct_retail_line_items

  - name: fct_digital_ad_performance
    description: Unified digital advertising performance across Google Ads and Meta Ads platforms
    meta:
      owner: Marketing Team
      grain: one row per campaign-adgroup-date-platform-placement-device combination
    columns:
      - name: report_date
        description: Date of the performance metrics
        tests:
          - not_null
      - name: ad_platform
        description: Advertising platform (Google Ads, Facebook, Instagram)
        tests:
          - not_null
          - accepted_values:
              values: ['Google Ads', 'Facebook', 'Instagram']
      - name: campaign_id
        description: Platform-specific campaign identifier
        tests:
          - not_null
      - name: campaign_name
        description: Campaign name
        tests:
          - not_null
      - name: campaign_category
        description: Derived campaign category
        tests:
          - not_null
      - name: impressions
        tests:
          - not_null
      - name: clicks
        tests:
          - not_null
      - name: spend
        tests:
          - not_null

  - name: fct_website_traffic
    description: Daily website traffic aggregated by channel, campaign, page category, and device
    meta:
      owner: Marketing Team
      grain: one row per date-channel-source-medium-campaign-page_category-device combination
    columns:
      - name: report_date
        description: Date of the website sessions
        tests:
          - not_null
      - name: channel_grouping
        description: Marketing channel grouping
        tests:
          - not_null
          - accepted_values:
              values: ['Paid Search', 'Paid Social', 'Organic Search', 'Email', 'Direct', 'Other']
      - name: sessions
        description: Number of sessions
        tests:
          - not_null
      - name: unique_users
        description: Count of distinct users
        tests:
          - not_null
      - name: conversions
        description: Number of purchase conversions
        tests:
          - not_null

  - name: fct_marketing_channel_summary
    description: Unified daily marketing channel performance across paid, owned, and earned channels
    meta:
      owner: Marketing Team
      grain: one row per date-channel combination
    columns:
      - name: report_date
        description: Report date
        tests:
          - not_null
      - name: channel
        description: Marketing channel name
        tests:
          - not_null
      - name: impressions
        tests:
          - not_null
      - name: clicks
        tests:
          - not_null
      - name: spend
        tests:
          - not_null

  - name: fct_ad_campaign_daily
    description: Campaign-level daily ad performance summary across Google Ads and Meta
    meta:
      owner: Marketing Team
      grain: one row per campaign-platform-date
    columns:
      - name: report_date
        tests:
          - not_null
      - name: ad_platform
        tests:
          - not_null
          - accepted_values:
              values: ['Google Ads', 'Facebook', 'Instagram']
      - name: campaign_id
        tests:
          - not_null
      - name: campaign_name
        tests:
          - not_null
      - name: impressions
        tests:
          - not_null
      - name: spend
        tests:
          - not_null

  - name: fct_website_funnel
    description: Website conversion funnel with page progression and drop-off rates by channel and device
    meta:
      owner: Marketing Team
      grain: one row per date-channel-device combination
    columns:
      - name: report_date
        tests:
          - not_null
      - name: channel_grouping
        tests:
          - not_null
      - name: total_visitors
        tests:
          - not_null
      - name: stage_converted
        tests:
          - not_null
      - name: overall_conversion_rate_pct
        tests:
          - not_null

  - name: bridge_session_customer
    description: Bridge table linking converting GA sessions to identity-resolved customers via same-day ticket purchases
    meta:
      owner: Data Engineering
      grain: one row per session-customer match
    columns:
      - name: session_id
        tests:
          - not_null
      - name: session_date
        tests:
          - not_null
      - name: channel_grouping
        tests:
          - not_null

  - name: fct_marketing_sales_daily
    description: Daily marketing channel performance joined with ticket and retail sales for marketing-to-revenue analysis
    meta:
      owner: Marketing Team
      grain: one row per date-channel combination
    columns:
      - name: report_date
        description: Report date
        tests:
          - not_null
      - name: channel
        description: Marketing channel name
        tests:
          - not_null
      - name: total_sales_revenue
        description: Combined ticket and retail revenue for the day
        tests:
          - not_null
      - name: spend
        description: Marketing spend for the channel on that day
        tests:
          - not_null

  - name: fct_campaign_attribution
    description: Channel-attributed ticket and retail revenue using session-to-customer matching
    meta:
      owner: Marketing Team
      grain: one row per date-channel-source-medium-segment-membership combination
    columns:
      - name: report_date
        description: Date of attributed transactions
        tests:
          - not_null
      - name: channel_grouping
        description: Marketing channel grouping from GA sessions
        tests:
          - not_null
      - name: total_attributed_revenue
        description: Combined attributed ticket and retail revenue
        tests:
          - not_null
