version: 2

sources:
  - name: bronze
    database: "{{ target.database }}"
    schema: BRONZE
    description: Raw ingested data from museum source systems
    loaded_at_field: _loaded_at
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    tables:
      - name: raw_pos_tickets
        description: Raw POS ticket sales transactions from the museum ticketing system
        freshness:
          warn_after: {count: 30, period: minute}
          error_after: {count: 60, period: minute}
        columns:
          - name: transaction_id
            description: Unique identifier for each ticket transaction
            tests:
              - not_null
              - unique
          - name: transaction_timestamp
            description: Timestamp when the ticket transaction occurred
            tests:
              - not_null
          - name: ticket_type
            description: Type of ticket purchased
            tests:
              - not_null
          - name: quantity
            description: Number of tickets in this transaction
            tests:
              - not_null
          - name: unit_price
            description: Price per ticket
            tests:
              - not_null
          - name: total_amount
            description: Total transaction amount after discounts
            tests:
              - not_null
          - name: payment_method
            description: Method of payment used
            tests:
              - accepted_values:
                  values: ['Credit Card', 'Debit Card', 'Cash', 'Mobile Pay']

      - name: raw_pos_retail
        description: Raw POS gift shop and retail store transactions
        columns:
          - name: transaction_id
            description: Unique identifier for each retail transaction
            tests:
              - not_null
              - unique
          - name: transaction_timestamp
            description: Timestamp when the retail transaction occurred
            tests:
              - not_null
          - name: item_sku
            description: Stock keeping unit identifier
            tests:
              - not_null
          - name: quantity
            description: Number of items purchased
            tests:
              - not_null
          - name: unit_price
            description: Price per item
            tests:
              - not_null
          - name: total_amount
            description: Total transaction amount
            tests:
              - not_null

      - name: raw_ticket_scans
        description: Raw ticket scanning events at museum entry gates
        columns:
          - name: scan_id
            description: Unique identifier for each scan event
            tests:
              - not_null
              - unique
          - name: scan_timestamp
            description: Timestamp when the scan occurred
            tests:
              - not_null
          - name: gate_id
            description: Identifier for the physical gate where scan occurred
            tests:
              - not_null
          - name: scan_result
            description: Result of the scan validation
            tests:
              - not_null
              - accepted_values:
                  values: ['VALID', 'EXPIRED', 'ALREADY_USED', 'INVALID']
          - name: visitor_count
            description: Number of visitors associated with this scan
            tests:
              - not_null

      - name: raw_sf_crm
        description: Salesforce CRM contact and membership records
        columns:
          - name: contact_id
            description: Salesforce 18-character contact ID
            tests:
              - not_null
              - unique
          - name: email
            description: Contact email address
            tests:
              - not_null
          - name: membership_status
            description: Current membership status
            tests:
              - accepted_values:
                  values: ['Active', 'Expired', 'Lapsed']
          - name: membership_type
            description: Type of museum membership
            tests:
              - not_null

      - name: raw_sf_marketing_cloud
        description: Salesforce Marketing Cloud email campaign events
        columns:
          - name: event_id
            description: Unique identifier for each email event
            tests:
              - not_null
              - unique
          - name: event_timestamp
            description: Timestamp when the email event occurred
            tests:
              - not_null
          - name: event_type
            description: Type of email event
            tests:
              - not_null
              - accepted_values:
                  values: ['Sent', 'Open', 'Click', 'Bounce', 'Unsubscribe']
          - name: subscriber_key
            description: Unique subscriber identifier
            tests:
              - not_null
          - name: campaign_id
            description: Campaign identifier
            tests:
              - not_null

      - name: raw_customer_identifiers
        description: Identity graph linking customers across systems via email and phone
        columns:
          - name: source_system
            description: System that provided this identifier (CRM, POS_TICKETS, POS_RETAIL)
          - name: source_id
            description: Original ID from source system
          - name: identifier_type
            description: Type of identifier (EMAIL, PHONE)
          - name: identifier_value
            description: The identifier value
          - name: is_primary
            description: Whether this is the primary identifier for this source record

      - name: raw_ticket_capacity
        description: Ticket capacity configuration per date, 30-minute entry window, and ticket type
        columns:
          - name: capacity_date
            description: Date the capacity applies to
            tests:
              - not_null
          - name: entry_window_start
            description: Start time of the 30-minute entry window
            tests:
              - not_null
          - name: ticket_type
            description: Ticket type name
            tests:
              - not_null
          - name: capacity
            description: Maximum number of tickets available for this window
            tests:
              - not_null
